name: docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."git.home.local"]
              insecure = true

      - name: Log in to Gitea container registry
        uses: docker/login-action@v4
        with:
          registry: git.home.local
          # Use REGISTRY_USER and REGISTRY_TOKEN while https://github.com/go-gitea/gitea/issues/23642 is fixed
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: git.home.local/${{ gitea.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LYRA_GIT_HASH=${{ gitea.sha }}
          cache-from: type=registry,ref=git.home.local/${{ gitea.repository }}:buildcache
          cache-to: type=registry,ref=git.home.local/${{ gitea.repository }}:buildcache,mode=max
